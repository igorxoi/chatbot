<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="src/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Chatbot</title>
  </head>
  <body>
    <main class="onboarding hidden">
      <div class="message-bubble">
        <p class="initial-message message">
          Olá, antes de iniciar nos informe o seu CPF.
        </p>
      </div>

      <div class="loading">
        <span>●</span>
        <span>●</span>
        <span>●</span>
      </div>

      <section class="chat-input-area">
        <input
          type="text"
          id="cpf"
          class="chat-input"
          placeholder="Digite seu CPF"
        />
        <input
          type="email"
          id="email"
          class="chat-input hide"
          placeholder="Digite seu email"
        />
        <textarea
          id="message"
          class="chat-input hide"
          placeholder="Digite sua mensagem aqui..."
        ></textarea>

        <div class="actions">
          <button type="button" id="restart-button">Restart</button>
          <button type="button" id="submit-button">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M12 19V5M5 12l7-7 7 7"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
      </section>
    </main>
    <script type="module" src="./src/js/pages/index.js"></script>
  </body>
</html>
